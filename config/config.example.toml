# Synthread Configuration
# Copy to config.toml and edit. Do NOT commit config.toml!

[bootstrap]
# Public libp2p bootstrap nodes
peers = [
    "/dnsaddr/bootstrap.libp2p.io/p2p/12D3KooWEZXxHh7ZXhdBXMgMUHkA9kcE1JpTte6KzDpFv19g6ANf",
]
# Optional: add your own bootstrap/relay peer
# "/ip4/<your-vps-ip>/tcp/9000/p2p/<peer-id>"

[network]
listen_addresses = ["/ip4/0.0.0.0/tcp/9000"]
# Enable QUIC transport (Phase 3+)
# quic = false

[api]
port = 7700
bind_address = "127.0.0.1"

[plugins.inter_plugin_sharing]
enabled = false
# Allowed plugin pairs for data sharing
allowed_pairs = [
    # ["chat-dm", "agent-wiki"],
]

[relay]
# VPS relay for NAT traversal fallback
# peer_id = ""
# address = ""

[logging]
level = "info"  # trace, debug, info, warn, error
